<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow – Get Notified</title>

    <!-- Bootstrap & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

body {
    animation: fadeIn 0.8s ease-out forwards;
}
        :root {
            --mint-green: #9CC5B0;
            --dark-mint: #7BA896;
            --medium-gray: #6F7C81;
            --light-bg: #F7F9F9;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F7F9F9 0%, #E8F0ED 100%);
            color: var(--medium-gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Nunito Sans', sans-serif;
            font-weight: 800;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 60px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            user-select: none;
        }

        .logo img {
            height: 40px;
        }

        .logo span {
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--mint-green);
        }

        .email-input {
            border-radius: 50px;
            padding: 14px 22px;
            border: 1px solid #D6E2DC;
            font-size: 1rem;
        }

        .email-input:focus {
            border-color: var(--mint-green);
            box-shadow: 0 0 0 0.2rem rgba(156, 197, 176, 0.25);
        }

        .btn-primary-custom {
            background: var(--mint-green);
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(156, 197, 176, 0.35);
            margin-top: 20px;
            width: 100%;
        }

        .btn-primary-custom:hover {
            background: var(--dark-mint);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(156, 197, 176, 0.45);
        }

        .small-text {
            font-size: 0.9rem;
            color: #8A9498;
            margin-top: 15px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--medium-gray);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--dark-mint);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <!-- Logo -->
        <div class="logo">
            <img src="BEAM Logo.png" alt="BEAM Logo">
            <span>MediFlow</span>
        </div>

        <!-- Content -->
        <h1>Coming Soon</h1>
        <p class="mt-3">
            MediFlow is currently in development.  
            Leave your email and be the first to know when we launch.
        </p>

        <!-- Email Form -->
        <form>
            <input 
                type="email" 
                class="form-control email-input mt-4"
                placeholder="Enter your email address"
                required
            >
            <button type="submit" class="btn-primary-custom">
                Notify Me
            </button>
        </form>

        <p class="small-text">
            No spam. Just a single notification when MediFlow is available.
        </p>

        <!-- Back -->
        <a href="index.html#top" class="back-link">
            ← Back to home
        </a>
    </div>

</body>
</html>
